name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write  # required for gh release create

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # Gate: tag must match VERSION file
      - name: Validate tag matches VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          echo "Version: $FILE_VERSION"

      # Import Developer ID certificate into a temporary keychain.
      # Appends to the existing keychain search list (not replaces) so system
      # roots and the login keychain remain available to codesign and xcodebuild.
      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERTIFICATE_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          # Append build keychain to search list, preserving existing keychains
          security list-keychains -d user -s \
            "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed -e 's/ *"//g')

      # Run tests before building the release artifact
      - name: Run tests
        run: swift test

      # Build and archive using xcodebuild (handles icons, assets, entitlements)
      - name: Build archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(cat VERSION)
          xcodebuild archive \
            -project Canopy.xcodeproj \
            -scheme Canopy \
            -configuration Release \
            -archivePath "build/Canopy.xcarchive" \
            MARKETING_VERSION="$VERSION" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      # Export signed .app from the archive.
      # PlistBuddy injects teamID cleanly without fragile sed substitution.
      - name: Export .app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cp ExportOptions.plist /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string ${APPLE_TEAM_ID}" /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath "build/Canopy.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "build/export"

      # Verify signature before spending time on notarization
      - name: Verify signature
        run: |
          codesign --verify --deep --strict "build/export/Canopy.app"
          spctl --assess --type execute "build/export/Canopy.app"
          echo "Signature OK"

      # Create a professional DMG with background and Applications shortcut
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION=$(cat VERSION)
          create-dmg \
            --volname "Canopy" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Canopy.app" 175 190 \
            --hide-extension "Canopy.app" \
            --app-drop-link 425 190 \
            "build/Canopy-${VERSION}.dmg" \
            "build/export/"

      # Sign the DMG itself (required for notarization)
      - name: Sign DMG
        run: |
          VERSION=$(cat VERSION)
          codesign --sign "Developer ID Application" \
            --keychain "$RUNNER_TEMP/build.keychain" \
            "build/Canopy-${VERSION}.dmg"

      # Submit to Apple for notarization — blocks until Apple responds (2–10 min)
      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(cat VERSION)
          xcrun notarytool submit "build/Canopy-${VERSION}.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      # Attach the notarization ticket to the DMG so it passes Gatekeeper offline
      - name: Staple notarization ticket
        run: |
          VERSION=$(cat VERSION)
          xcrun stapler staple "build/Canopy-${VERSION}.dmg"

      # Upload notarized DMG as artifact — recovery point if later steps fail,
      # and source of truth for SHA256 (homebrew.yml reads from artifact, not CDN)
      - name: Upload notarized DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canopy-notarized
          path: build/Canopy-*.dmg
          retention-days: 30

      # Generate checksums from the artifact (not CDN) — used by homebrew.yml
      - name: Generate checksums
        run: |
          VERSION=$(cat VERSION)
          shasum -a 256 "build/Canopy-${VERSION}.dmg" > checksums-sha256.txt
          cat checksums-sha256.txt

      # Extract release notes from CHANGELOG.md for this version
      - name: Extract release notes
        run: |
          VERSION=$(cat VERSION)
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" \
            CHANGELOG.md > RELEASE_NOTES.md
          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      # Create the GitHub Release and attach the DMG and checksums
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat VERSION)
          gh release create "v${VERSION}" \
            --title "Canopy v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            "build/Canopy-${VERSION}.dmg" \
            "checksums-sha256.txt"

      # Clean up the temporary keychain (always runs, even on failure)
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
